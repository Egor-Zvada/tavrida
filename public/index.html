<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VK Bot Demo</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail" aria-label="Навигация">
        <div class="vk-mark">vk</div>
        <button class="icon-button is-active" title="Мессенджер" aria-label="Мессенджер">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.8A3.8 3.8 0 0 1 7.8 2h8.4A3.8 3.8 0 0 1 20 5.8v6.8a3.8 3.8 0 0 1-3.8 3.8h-4.6l-4.8 3.1a.8.8 0 0 1-1.2-.7v-2.5A3.8 3.8 0 0 1 4 12.6V5.8Z"/></svg>
        </button>
        <button class="icon-button" id="settingsButton" title="Настройки" aria-label="Настройки">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9 4c0 .7-.1 1.3-.3 1.9l2 1.5-2 3.4-2.3-.9c-1 .8-1.4 1-2.4 1.4l-.4 2.5H8.4L8 19.3c-1-.4-1.8-.8-2.5-1.5l-2.3.9-2-3.4 2-1.5A7.4 7.4 0 0 1 3 12c0-.7.1-1.3.3-1.9l-2-1.5 2-3.4 2.3.9c.7-.7 1.5-1.1 2.4-1.5L8.4 2h7.2l.4 2.6c1 .4 1.8.8 2.5 1.5l2.3-.9 2 3.4-2 1.5c.1.6.2 1.2.2 1.9Z"/></svg>
        </button>
      </aside>

      <aside class="dialogs">
        <header class="dialogs-header">
          <h1>Мессенджер</h1>
          <button class="icon-button" title="Новый чат" aria-label="Новый чат">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5a1 1 0 0 1 2 0v6h6a1 1 0 1 1 0 2h-6v6a1 1 0 1 1-2 0v-6H5a1 1 0 1 1 0-2h6V5Z"/></svg>
          </button>
        </header>
        <label class="search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 0 1 5.1 10.5l4 4a1 1 0 0 1-1.4 1.4l-4-4A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"/></svg>
          <input id="dialogSearch" type="search" placeholder="Поиск">
        </label>
        <nav class="dialog-list" id="dialogList"></nav>
      </aside>

      <main class="chat">
        <header class="chat-header">
          <div class="avatar bot-avatar">AI</div>
          <div class="chat-title">
            <strong id="chatName">AI ассистент</strong>
            <span id="chatStatus">OpenAI-compatible LLM, STT и TTS</span>
          </div>
          <div class="chat-actions">
            <label class="toggle">
              <input id="ttsToggle" type="checkbox" checked>
              <span>Озвучивать</span>
            </label>
          </div>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <footer class="composer">
          <button class="icon-button" id="recordButton" title="Записать голос" aria-label="Записать голос">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a3.5 3.5 0 0 0-3.5 3.5V12a3.5 3.5 0 1 0 7 0V6.5A3.5 3.5 0 0 0 12 3Zm6 8a1 1 0 0 0-1 1 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.9V21H8a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2h-3v-1.1A7 7 0 0 0 19 12a1 1 0 0 0-1-1Z"/></svg>
          </button>
          <textarea id="messageInput" rows="1" placeholder="Напишите сообщение"></textarea>
          <button class="send-button" id="sendButton" title="Отправить" aria-label="Отправить">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.7 4.4a1.2 1.2 0 0 1 1.4-.2l15 7a1.2 1.2 0 0 1 0 2.2l-15 7a1.2 1.2 0 0 1-1.6-1.5L5.2 13H12a1 1 0 1 0 0-2H5.2L3.5 5.8a1.2 1.2 0 0 1 .2-1.4Z"/></svg>
          </button>
        </footer>
      </main>

      <aside class="settings-panel" id="settingsPanel" aria-label="Настройки">
        <header>
          <h2>Настройки API</h2>
          <button class="icon-button" id="closeSettings" title="Закрыть" aria-label="Закрыть">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.2 4.8 12 10.6l5.8-5.8a1 1 0 1 1 1.4 1.4L13.4 12l5.8 5.8a1 1 0 0 1-1.4 1.4L12 13.4l-5.8 5.8a1 1 0 0 1-1.4-1.4l5.8-5.8-5.8-5.8a1 1 0 0 1 1.4-1.4Z"/></svg>
          </button>
        </header>
        <label>
          <span>Модель LLM</span>
          <input id="modelInput" type="text" list="modelOptions" autocomplete="off">
          <datalist id="modelOptions"></datalist>
        </label>
        <label>
          <span>Температура</span>
          <input id="temperatureInput" type="number" min="0" max="2" step="0.1" value="0.6">
        </label>
        <label>
          <span>Системная инструкция</span>
          <textarea id="systemPrompt" rows="7"></textarea>
        </label>
        <section class="settings-section">
          <h3>VK Callback API</h3>
          <label class="checkbox-row">
            <input id="vkEnabled" type="checkbox">
            <span>Включить VK</span>
          </label>
          <label>
            <span>Group ID</span>
            <input id="vkGroupId" type="text" autocomplete="off" placeholder="123456789">
          </label>
          <label>
            <span>Токен сообщества</span>
            <input id="vkToken" type="password" autocomplete="off" placeholder="Оставьте пустым, чтобы не менять">
          </label>
          <label>
            <span>Secret</span>
            <input id="vkSecret" type="text" autocomplete="off">
          </label>
          <label>
            <span>Confirmation</span>
            <input id="vkConfirmation" type="text" autocomplete="off">
          </label>
          <label class="checkbox-row">
            <input id="vkSendText" type="checkbox" checked>
            <span>Сначала отвечать текстом</span>
          </label>
          <label class="checkbox-row">
            <input id="vkSendVoice" type="checkbox" checked>
            <span>Потом отправлять голосовое</span>
          </label>
          <button class="settings-save" id="vkSaveButton" type="button">Сохранить VK</button>
          <div class="callback-box" id="vkCallbackBox"></div>
        </section>
        <div class="endpoint-list" id="endpointList"></div>
      </aside>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="bubble"></div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
